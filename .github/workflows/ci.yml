name: Auth Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URI: mongodb://localhost:27017
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      SECRET_KEY: test-secret # pragma: allowlist secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------
      # FORMAT CHECK
      # -------------------------
      - name: Check formatting (Black + isort)
        run: |
          black --check .
          isort --check-only .

      # -------------------------
      # LINT
      # -------------------------
      - name: Lint (flake8)
        run: flake8 .

      # -------------------------
      # TYPE CHECK
      # -------------------------
      - name: Type check (mypy)
        run: mypy app/

      # -------------------------
      # SECURITY SCANS
      # -------------------------
      - name: Security scan (Bandit)
        run: bandit -r app/ -ll

      - name: Dependency scan (pip-audit)
        run: pip-audit --ignore-vuln CVE-2025-71176

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests
        run: pytest -v --maxfail=1 --disable-warnings